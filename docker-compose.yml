services:

  # ── PHP-FPM application ──────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: task_manager_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
    networks:
      - task_manager
    depends_on:
      db:
        condition: service_healthy

  # ── Nginx web server ─────────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: task_manager_nginx
    restart: unless-stopped
    ports:
      - "${APP_PORT:-80}:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - task_manager
    depends_on:
      - app

  # ── MySQL database ───────────────────────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: task_manager_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-coalition_test}
      MYSQL_USER: ${DB_USERNAME:-laravel}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-secret}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - task_manager
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  task_manager:
    driver: bridge

volumes:
  mysql_data:
    driver: local
